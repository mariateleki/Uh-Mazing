<!DOCTYPE html>
<!-- Run instructions: open in browser with ?script=YOUR_APPS_SCRIPT_URL to load live data -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Uh-Mazing — Admin</title>
  <style>
    :root { --accent: #6C5B7B; --accent-light: #ede8f1; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f7; color: #222;
      padding: 32px 24px 80px;
    }
    h1 { font-size: 1.5rem; color: var(--accent); margin-bottom: 4px; }
    .subtitle { color: #888; font-size: .9rem; margin-bottom: 28px; }

    .toolbar {
      display: flex; gap: 12px; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    input[type=text] {
      padding: 8px 14px; border: 1px solid #ccc;
      border-radius: 6px; font-size: .9rem; width: 420px;
      outline: none;
    }
    input[type=text]:focus { border-color: var(--accent); }
    .btn {
      padding: 8px 20px; border: none; border-radius: 6px;
      font-size: .9rem; font-weight: 600; cursor: pointer;
      background: var(--accent); color: #fff;
    }
    .btn:hover { opacity: .88; }
    .btn-sec { background: #f0edf5; color: var(--accent); }

    .status { font-size: .85rem; color: #888; margin-bottom: 20px; }
    .status.err { color: #c62828; }

    /* Summary cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 32px;
    }
    .summary-card {
      background: #fff; border: 1px solid #e0d9ec;
      border-radius: 8px; padding: 16px 18px;
    }
    .summary-card .lang { font-weight: 700; color: var(--accent); font-size: 1rem; }
    .summary-card .counts { font-size: .85rem; color: #666; margin-top: 4px; }
    .summary-card .bar { margin-top: 8px; height: 4px; background: #ece7f5; border-radius: 99px; overflow: hidden; }
    .summary-card .bar-fill { height: 100%; background: var(--accent); border-radius: 99px; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse;
      background: #fff; border-radius: 8px;
      overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.06);
      font-size: .88rem;
    }
    thead { background: var(--accent); color: #fff; }
    thead th { padding: 11px 14px; text-align: left; font-weight: 600; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #f0edf5; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #faf8fc; }
    td { padding: 10px 14px; }
    .badge {
      display: inline-block; padding: 2px 10px;
      border-radius: 99px; font-size: .75rem; font-weight: 700;
    }
    .badge-started   { background: #fff3cd; color: #856404; }
    .badge-completed { background: #d4edda; color: #155724; }
    .prog { font-size: .82rem; color: #888; }

    /* Links section */
    .section-title {
      font-size: .75rem; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; color: #aaa;
      margin: 32px 0 12px;
    }
    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
      margin-bottom: 32px;
    }
    .link-card {
      background: #fff; border: 1px solid #e0d9ec;
      border-radius: 8px; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .link-card .lc-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .link-card .lc-lang { font-weight: 700; color: var(--accent); font-size: .95rem; }
    .link-card .lc-count { font-size: .78rem; color: #999; }
    .link-row {
      display: flex; align-items: center; gap: 6px;
    }
    .link-row a {
      font-size: .78rem; color: #555;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; text-decoration: none;
    }
    .link-row a:hover { color: var(--accent); text-decoration: underline; }
    .link-row .tag {
      font-size: .68rem; font-weight: 700; letter-spacing: .04em;
      padding: 2px 7px; border-radius: 99px; white-space: nowrap;
    }
    .tag-live { background: #d4edda; color: #155724; }
    .tag-test { background: #fff3cd; color: #856404; }
    .copy-btn {
      background: none; border: 1px solid #ddd; border-radius: 5px;
      padding: 2px 8px; font-size: .72rem; cursor: pointer; color: #888;
      white-space: nowrap;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: #2e7d32; color: #2e7d32; }
  </style>
</head>
<body>
<h1>Uh-Mazing — Admin Console</h1>
<p class="subtitle">Annotation progress by annotator</p>

<div class="toolbar">
  <input type="text" id="scriptUrl" placeholder="Paste Apps Script URL here…">
  <button class="btn" onclick="loadData()">Load</button>
  <button class="btn btn-sec" onclick="loadData()">↻ Refresh</button>
</div>
<div class="status" id="status">Enter your Apps Script URL and click Load.</div>

<div class="section-title">Annotator links</div>
<div class="links-grid" id="linksGrid"></div>

<div class="section-title">Progress</div>
<div class="summary-grid" id="summaryGrid"></div>

<div class="table-wrap">
  <table id="dataTable">
    <thead>
      <tr>
        <th>Prolific ID</th>
        <th>Lang</th>
        <th>Part</th>
        <th>Native lang</th>
        <th>Fluency</th>
        <th>Age</th>
        <th>Status</th>
        <th>Annotations</th>
        <th>Started</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="9" style="color:#aaa;text-align:center;padding:24px">No data loaded yet.</td></tr>
    </tbody>
  </table>
</div>

<script src="data.js"></script>
<script>
const LANG_NAMES = {
  ZH: 'Mandarin', ES: 'Spanish', HI: 'Hindi', FR: 'French',
  DE: 'German',   IT: 'Italian', CS: 'Czech',  AR: 'Arabic'
};

// Total utterances per language from inline data
const LANG_TOTALS = {};
for (const [lang, items] of Object.entries(INLINE_DATA)) {
  LANG_TOTALS[lang] = items.length;
}
// Annotators do half a language at a time. Mirror PART_SIZE in annotate.html.
const PART_SIZE = 40;
function denomFor(lang, part) {
  // 40 if a specific part is set, otherwise the full language total.
  if (part === 1 || part === 2) return PART_SIZE;
  return LANG_TOTALS[lang] || '?';
}

// Pre-fill script URL from query param ?script=...
const params = new URLSearchParams(location.search);
if (params.get('script')) {
  document.getElementById('scriptUrl').value = params.get('script');
}

// ── LINKS ─────────────────────────────────────────────────────────────────────
const BASE_URL = location.href.replace(/admin\.html.*$/, 'annotate.html');

function annotatorUrl(lang, opts = {}) {
  const qs = new URLSearchParams();
  qs.set('lang', lang);
  if (opts.part) qs.set('part', String(opts.part));
  if (opts.pid)  qs.set('pid', opts.pid);
  return BASE_URL + '?' + qs.toString();
}

function renderLinks() {
  const grid = document.getElementById('linksGrid');
  grid.innerHTML = Object.entries(LANG_NAMES).map(([lang, name]) => {
    const total   = LANG_TOTALS[lang] || '?';
    const p1Live  = annotatorUrl(lang, { part: 1 });
    const p2Live  = annotatorUrl(lang, { part: 2 });
    const p1Test  = annotatorUrl(lang, { part: 1, pid: 'TESTXXX' });
    const p2Test  = annotatorUrl(lang, { part: 2, pid: 'TESTXXX' });
    const allUrl  = annotatorUrl(lang);  // back-compat / preview, all 80
    return `
    <div class="link-card">
      <div class="lc-header">
        <span class="lc-lang">${lang} — ${name}</span>
        <span class="lc-count">${total} utts · ${PART_SIZE}/part</span>
      </div>
      <div class="link-row">
        <span class="tag tag-live">part 1 live</span>
        <a href="${p1Live}" target="_blank">${p1Live}</a>
        <button class="copy-btn" onclick="copyLink(this,'${p1Live}')">Copy</button>
      </div>
      <div class="link-row">
        <span class="tag tag-live">part 2 live</span>
        <a href="${p2Live}" target="_blank">${p2Live}</a>
        <button class="copy-btn" onclick="copyLink(this,'${p2Live}')">Copy</button>
      </div>
      <div class="link-row">
        <span class="tag tag-test">part 1 test</span>
        <a href="${p1Test}" target="_blank">${p1Test}</a>
        <button class="copy-btn" onclick="copyLink(this,'${p1Test}')">Copy</button>
      </div>
      <div class="link-row">
        <span class="tag tag-test">part 2 test</span>
        <a href="${p2Test}" target="_blank">${p2Test}</a>
        <button class="copy-btn" onclick="copyLink(this,'${p2Test}')">Copy</button>
      </div>
      <div class="link-row" style="opacity:.6;font-size:.78rem">
        <span class="tag" style="background:#eee;color:#666">preview all</span>
        <a href="${allUrl}" target="_blank">${allUrl}</a>
      </div>
    </div>`;
  }).join('');
}

function copyLink(btn, url) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// Render links immediately on page load
renderLinks();

function loadData() {
  const url = document.getElementById('scriptUrl').value.trim();
  if (!url) {
    setStatus('Please enter your Apps Script URL.', true);
    return;
  }
  setStatus('Loading…');

  // Use JSONP to bypass CORS — Apps Script returns callback(json)
  const callbackName = '_adminCb_' + Date.now();
  const script = document.createElement('script');

  window[callbackName] = function(json) {
    delete window[callbackName];
    document.head.removeChild(script);
    if (json.status !== 'ok') {
      setStatus('Error: ' + (json.message || 'Script error'), true);
      return;
    }
    renderData(json.annotators || []);
    setStatus(`Loaded ${json.annotators?.length ?? 0} annotators · ${new Date().toLocaleTimeString()}`);
  };

  script.onerror = function() {
    delete window[callbackName];
    document.head.removeChild(script);
    setStatus('Error: could not reach Apps Script. Check the URL and deployment settings.', true);
  };

  script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
  document.head.appendChild(script);
}

function setStatus(msg, isErr = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isErr ? ' err' : '');
}

function partLabel(part) {
  if (part === 1 || part === '1') return 'p1';
  if (part === 2 || part === '2') return 'p2';
  return 'all';
}

function renderData(annotators) {
  // ── Summary cards: one card per (lang, part) bucket ──
  // Keys look like "ZH:p1", "ZH:p2", "ZH:all" so each Prolific study is
  // tracked separately even when the same worker did both halves.
  const buckets = {};
  for (const a of annotators) {
    const key = a.lang + ':' + partLabel(a.part);
    if (!buckets[key]) buckets[key] = {
      lang: a.lang, part: a.part, started: 0, completed: 0,
      annotations: 0, n_annotators: 0
    };
    buckets[key][a.status === 'completed' ? 'completed' : 'started']++;
    buckets[key].annotations += a.annotations_submitted || 0;
    buckets[key].n_annotators++;
  }

  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = Object.entries(buckets)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([, d]) => {
      const partTag = d.part === 1 || d.part === '1' ? 'part 1'
                    : d.part === 2 || d.part === '2' ? 'part 2'
                    : 'all';
      const denom = denomFor(d.lang, d.part);
      const pctDone = typeof denom === 'number'
        ? Math.round((d.completed / Math.max(1, d.n_annotators)) * 100) : 0;
      return `
      <div class="summary-card">
        <div class="lang">${d.lang} — ${LANG_NAMES[d.lang] || ''} <span style="color:#999;font-weight:400">· ${partTag}</span></div>
        <div class="counts">
          ${d.completed} completed · ${d.started} in progress<br>
          ${d.annotations} annotations · ${denom} utts/annotator
        </div>
        <div class="bar"><div class="bar-fill" style="width:${pctDone}%"></div></div>
      </div>`;
    }).join('');

  // ── Table ──
  const tbody = document.getElementById('tableBody');
  if (annotators.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" style="color:#aaa;text-align:center;padding:24px">No annotations yet.</td></tr>';
    return;
  }

  tbody.innerHTML = annotators
    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
    .map(a => {
      const denom = denomFor(a.lang, a.part);
      const pct   = typeof denom === 'number'
        ? Math.round(((a.annotations_submitted || 0) / denom) * 100) : '?';
      const badge = a.status === 'completed'
        ? '<span class="badge badge-completed">completed</span>'
        : '<span class="badge badge-started">in progress</span>';
      const date  = a.timestamp ? new Date(a.timestamp).toLocaleString() : '—';
      const partCell = (a.part === 1 || a.part === '1') ? '1'
                     : (a.part === 2 || a.part === '2') ? '2'
                     : '<span style="color:#aaa">—</span>';
      return `
      <tr>
        <td><code style="font-size:.82rem">${esc(a.prolific_id)}</code></td>
        <td><strong>${esc(a.lang)}</strong></td>
        <td>${partCell}</td>
        <td>${esc(a.native_language)}</td>
        <td>${esc(a.fluency)}</td>
        <td>${esc(a.age_range)}</td>
        <td>${badge}</td>
        <td class="prog">${a.annotations_submitted || 0} / ${denom} (${pct}%)</td>
        <td style="font-size:.78rem;color:#aaa">${date}</td>
      </tr>`;
    }).join('');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
