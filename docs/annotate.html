<!DOCTYPE html>
<!-- Run instructions: open directly in browser, or serve via python3 -m http.server 8765 in docs/ -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Disfluency Annotation</title>
  <style>
    :root {
      --accent: #6C5B7B;
      --accent-light: #ede8f1;
      --hl: #ffe066;
      --hl-border: #e6c200;
      --radius: 8px;
      --max: 760px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f7;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 80px;
    }
    .screen {
      width: 100%;
      max-width: var(--max);
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      padding: 40px 48px;
    }
    @media (max-width: 600px) { .screen { padding: 28px 20px; } }

    h1 { font-size: 1.5rem; color: var(--accent); margin-bottom: 8px; }
    h2 { font-size: 1.15rem; color: var(--accent); margin-bottom: 16px; }
    p  { line-height: 1.6; margin-bottom: 14px; color: #444; }

    /* Progress bar */
    .progress-wrap { margin-bottom: 28px; }
    .progress-label { font-size: .85rem; color: #888; margin-bottom: 6px; }
    .progress-bar { height: 6px; background: #e9e5f0; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s; }

    /* Form */
    .field { margin-bottom: 20px; }
    label { display: block; font-size: .9rem; font-weight: 600; margin-bottom: 6px; color: #333; }
    input[type=text], select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      transition: border-color .15s;
    }
    input[type=text]:focus, select:focus { border-color: var(--accent); }
    .radio-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    .radio-group label {
      font-weight: 400;
      display: flex; align-items: center; gap: 5px;
      cursor: pointer;
      padding: 6px 14px;
      border: 1px solid #ccc;
      border-radius: 99px;
      font-size: .9rem;
      transition: border-color .15s, background .15s;
    }
    .radio-group input[type=radio] { display: none; }
    .radio-group input[type=radio]:checked + span,
    .radio-group label:has(input:checked) {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
    }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 11px 28px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-secondary { background: #f0edf5; color: var(--accent); }
    .btn-secondary:hover { background: #e4deef; }
    .btn-row { display: flex; gap: 12px; margin-top: 28px; align-items: center; }
    .btn-row.right { justify-content: flex-end; }

    /* Instructions */
    .instr-section { margin-bottom: 24px; }
    .instr-section h3 { font-size: 1rem; margin-bottom: 8px; color: #333; }
    .instr-section ul { padding-left: 22px; line-height: 1.7; color: #444; }

    /* Tutorial examples */
    .example-card {
      background: #f9f8fb;
      border: 1px solid #e0d9ec;
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .example-card .ex-label {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .ex-row { display: grid; grid-template-columns: 90px 1fr; gap: 8px 16px; align-items: start; margin-bottom: 6px; }
    .ex-lang { font-size: .8rem; font-weight: 700; color: #888; padding-top: 3px; }
    .ex-text { font-size: 1rem; line-height: 1.7; }
    .ex-note { font-size: .85rem; color: #666; margin-top: 10px; border-top: 1px solid #ece7f5; padding-top: 10px; line-height: 1.6; }

    /* Highlights */
    .hl {
      background: var(--hl);
      border-bottom: 2px solid var(--hl-border);
      border-radius: 3px;
      padding: 0 2px;
      cursor: pointer;
    }
    .hl:hover { background: #ffd633; }
    .word { cursor: pointer; border-radius: 3px; padding: 0 1px; }
    .word:hover { background: var(--accent-light); }

    /* Annotation card */
    .utt-card {
      border: 1px solid #e0d9ec;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .utt-card-header {
      background: #f4f0f9;
      padding: 10px 18px;
      font-size: .8rem;
      color: #888;
      font-weight: 600;
      letter-spacing: .04em;
    }
    .utt-card-body { padding: 18px 20px; }
    .side-label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #aaa;
      margin-bottom: 4px;
    }
    .en-text { font-size: .95rem; line-height: 1.7; color: #444; margin-bottom: 18px; }
    .trans-label-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 4px;
    }
    .slot-tag {
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      color: #aaa;
    }
    .trans-text { font-size: 1rem; line-height: 1.8; }
    .rtl { direction: rtl; text-align: right; font-size: 1.05rem; }

    /* Text edit */
    .text-edit-toggle {
      font-size: .75rem; color: var(--accent);
      background: none; border: none; cursor: pointer;
      text-decoration: underline; padding: 0;
    }
    .text-edit-area { display: none; margin-top: 10px; }
    .text-edit-area.open { display: block; }
    .text-edit-area textarea {
      width: 100%; min-height: 80px;
      border: 1px solid #ccc; border-radius: 6px;
      padding: 8px 12px; font-size: .95rem;
      font-family: inherit; resize: vertical;
    }
    .text-edit-area textarea:focus { outline: none; border-color: var(--accent); }
    .text-edit-actions { display: flex; gap: 8px; margin-top: 6px; }
    .btn-sm {
      padding: 5px 14px; font-size: .82rem;
      border: none; border-radius: 5px; cursor: pointer; font-weight: 600;
    }
    .btn-save-sm { background: var(--accent); color: #fff; }
    .btn-cancel-sm { background: #f0edf5; color: var(--accent); }
    .btn-reset-sm { background: #f5f5f5; color: #888; }

    /* Saving indicator */
    .save-status { font-size: .85rem; color: #888; }
    .save-status.ok { color: #2e7d32; }
    .save-status.err { color: #c62828; }

    /* Completion */
    .completion-code {
      font-size: 2rem; font-weight: 700; letter-spacing: .15em;
      color: var(--accent); background: var(--accent-light);
      border-radius: var(--radius); padding: 18px 32px;
      display: inline-block; margin: 16px 0;
    }
    .error-msg { color: #c62828; font-size: .88rem; margin-top: 6px; display: none; }
    .error-msg.visible { display: block; }

    /* Divider */
    hr { border: none; border-top: 1px solid #ece7f5; margin: 24px 0; }

    /* QC panel */
    /* QC review panel removed — workers now save & advance with no AI gate. */

    /* Report button */
    .report-btn {
      position: fixed;
      bottom: 18px;
      right: 20px;
      background: none;
      border: 1px solid #e57373;
      border-radius: 99px;
      font-size: .92rem;
      font-weight: 600;
      color: #c62828;
      padding: 8px 20px;
      cursor: pointer;
      transition: background .15s;
      z-index: 100;
    }
    .report-btn:hover { background: #fdecea; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 32px 36px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .modal-box h2 { margin-bottom: 8px; }
    .modal-box p  { font-size: .9rem; color: #666; margin-bottom: 14px; }
    .modal-box textarea {
      width: 100%; min-height: 100px;
      border: 1px solid #ccc; border-radius: 6px;
      padding: 10px 12px; font-size: .95rem;
      font-family: inherit; resize: vertical;
    }
    .modal-box textarea:focus { outline: none; border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }
  </style>
</head>
<body>
<div id="app"></div>

<!-- Persistent report button + modal (outside #app so it survives renders) -->
<button class="report-btn" onclick="openReportModal()">⚑ Report an issue</button>

<div class="modal-overlay" id="report-modal" onclick="closeReportModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h2>Report an issue</h2>
    <p>Describe what went wrong and we'll look into it.</p>
    <textarea id="report-msg" placeholder="e.g. The translation looks wrong, I can't click a word, the page seems broken…"></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-sm" onclick="closeReportModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="submitReport()">Send report</button>
    </div>
    <div id="report-status" style="margin-top:10px;font-size:.85rem;color:#888;text-align:right"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// Run instructions: deploy appscript.gs as a Google Apps Script web app, then
// paste the deployment URL below.
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPFTiYQUGH0RIrAJ_WUYRqgwPnKZD-ecquT-pFLRUG1o7H8DmM2MG5NGp8ewnkgtrr/exec';
// Single completion code shared across all language studies. Hardcoded so
// the final screen always displays the same code regardless of any ?cc=…
// URL parameter the worker may have arrived with.
const COMPLETION_CODE = 'CLS237NX';

const PROLIFIC_RETURN_URL = `https://app.prolific.com/submissions/complete?cc=${COMPLETION_CODE}`;

const LANG_NAMES = {
  ZH: 'Mandarin', ES: 'Spanish', HI: 'Hindi', FR: 'French',
  DE: 'German',   IT: 'Italian', CS: 'Czech',  AR: 'Arabic'
};
const RTL_LANGS = new Set(['AR']);
const SLOTS = ['T1', 'T2', 'T3', 'T4'];

// ── TUTORIAL DATA ─────────────────────────────────────────────────────────────
// Example 1: highlights wrong (tenían wrongly highlighted, comma missing)
// Example 2: mmm is wrong filler — must edit to uh and highlight it
// NOTE: indices below assume punctuation-splitting tokenizer.
// "de," → de(9),,(10) so um shifts to 11 vs old index 10.
const TUTORIAL = [
  {
    en: "I think that _they_ _, _ they had a great deal of, _um_, all the brothers and sisters got together and they actually had a conference.",
    es: "Creo que _ellos_ _, _ ellos tenían un gran acuerdo de, _um_, todos los hermanos y hermanas se juntaron y tuvieron una reunión.",
    // Wrong: ellos(2)✓  ,(3) MISSING  tenían(5) WRONGLY added  um(11)✓
    // "de," splits → de(9),,(10), so _um_ span is index 11
    wrongHL:   new Set([2, 5, 11]),
    correctHL: new Set([2, 3, 11]),   // index-based, text is fixed
    needsTextEdit: false,
  },
  {
    en: "_I_ _mean_ _, _ _uh_, it's, money seems to be too big of an issue. _With_ _, _ _with_ _, _ _with_ _, _ with what's going on today",
    // "uh" is present but as wrong word "mmm" (unhighlighted) — annotator must correct it and highlight
    // "mmm ," has a space before the comma so after correction "uh" is its own token
    es: "_Me_ _refiero_ _, _ mmm , es, el dinero parece ser un gran problema. _Con_ _, _ _con_ _, _ _con_ _, _ con lo que está pasando hoy en día",
    // "es," splits → es(5),,(6) and "problema." splits → problema(13),.(14)
    // so _Con_ and following spans shift from 13–18 → 15–20
    wrongHL: new Set([0,1,2,15,16,17,18,19,20]),
    needsTextEdit: true,
    hint: 'The filler word is wrong here — it says <strong>mmm</strong> but should be <strong>uh</strong>. Click <em>Edit text</em>, change <code>mmm</code> to <code>uh</code>, click Save, then highlight it.',
    checkFn(toks, h) {
      const hl = toks.filter(t => !t.isSpace && h.has(t.index)).map(t => t.text.toLowerCase());
      return hl.some(t => t.startsWith('uh'))
          && hl.includes('me')
          && hl.includes('refiero')
          && hl.filter(t => t === ',').length >= 4
          && hl.filter(t => t === 'con').length >= 2;
    }
  }
];

// Mutable tutorial state
let tutorialHighlights = null;
let tutorialTexts      = null;

function initTutorialHighlights() {
  if (tutorialHighlights) return;
  tutorialHighlights = TUTORIAL.map(ex => new Set(ex.wrongHL));
  tutorialTexts      = TUTORIAL.map(ex => ex.es);
}

function renderTutToks(tokens, exIdx, highlights) {
  return tokens.map(tok => {
    if (tok.isSpace) return escHtml(tok.text);
    const lit = highlights.has(tok.index);
    if (lit) {
      return `<span class="hl" onclick="toggleTutorialHL(${exIdx},${tok.index})">${escHtml(tok.text)}</span>`;
    }
    return `<span class="word" onclick="toggleTutorialHL(${exIdx},${tok.index})">${escHtml(tok.text)}</span>`;
  }).join('');
}

function toggleTutorialHL(exIdx, tokIdx) {
  const h      = tutorialHighlights[exIdx];
  const idx    = Number(tokIdx);
  const adding = !h.has(idx);
  if (adding) h.add(idx); else h.delete(idx);

  const toks = tokenize(tutorialTexts[exIdx]);
  const el   = document.getElementById(`tut-es-${exIdx}`);
  if (el) el.innerHTML = renderTutToks(toks, exIdx, h);

  // Wrong-move feedback
  const ex = TUTORIAL[exIdx];
  let isWrong = false;
  if (ex.correctHL) {
    isWrong = adding ? !ex.correctHL.has(idx) : ex.correctHL.has(idx);
  } else if (ex.checkFn) {
    // A move is wrong if it doesn't bring us closer: simulate the reverse and compare
    const tok = toks.find(t => t.index === idx);
    if (tok) {
      const t = tok.text.toLowerCase();
      // Expected to be highlighted: tokens starting with 'uh', or 'me','refiero',',','con'
      const shouldHL = t.startsWith('uh') || ['me','refiero',',','con'].includes(t);
      isWrong = adding ? !shouldHL : shouldHL;
    }
  }
  showTutFeedback(exIdx, isWrong);
  updateTutCheck(exIdx);
}

// ── TUTORIAL TEXT EDITING ─────────────────────────────────────────────────────
function openTutTextEdit(exIdx) {
  document.getElementById(`tut-edit-area-${exIdx}`).classList.add('open');
}
function closeTutTextEdit(exIdx) {
  document.getElementById(`tut-edit-area-${exIdx}`).classList.remove('open');
}
function saveTutTextEdit(exIdx) {
  const ta  = document.getElementById(`tut-edit-ta-${exIdx}`);
  const txt = ta.value;
  tutorialTexts[exIdx] = txt;
  // Re-init highlights from new spans in the edited text
  const toks = tokenize(txt);
  tutorialHighlights[exIdx] = new Set(toks.filter(t => t.isSpan).map(t => t.index));
  const el = document.getElementById(`tut-es-${exIdx}`);
  if (el) el.innerHTML = renderTutToks(toks, exIdx, tutorialHighlights[exIdx]);
  closeTutTextEdit(exIdx);
  updateTutCheck(exIdx);
}

let _feedbackTimer = null;
function showTutFeedback(exIdx, isWrong) {
  const el = document.getElementById(`tut-feedback-${exIdx}`);
  if (!el) return;
  clearTimeout(_feedbackTimer);
  if (isWrong) {
    el.textContent = "Hmm, that's not right — try again!";
    el.style.color = '#b71c1c';
    el.style.opacity = '1';
    _feedbackTimer = setTimeout(() => { el.style.opacity = '0'; }, 1800);
  } else {
    el.textContent = '';
    el.style.opacity = '0';
  }
}

function isTutCorrect(exIdx) {
  const ex = TUTORIAL[exIdx];
  const h  = tutorialHighlights[exIdx];
  if (ex.checkFn) {
    return ex.checkFn(tokenize(tutorialTexts[exIdx]), h);
  }
  // Index-based (example 1 — fixed text)
  return [...ex.correctHL].every(i => h.has(i)) &&
         [...h].every(i => ex.correctHL.has(i));
}

function updateTutCheck(exIdx) {
  const el = document.getElementById(`tut-check-${exIdx}`);
  if (el) {
    const ok = isTutCorrect(exIdx);
    el.textContent = ok ? '✓ Correct!' : '';
    el.style.color = '#2e7d32';
  }
  const allDone = TUTORIAL.every((_, i) => isTutCorrect(i));
  const btn  = document.getElementById('tut-proceed-btn');
  const hint = document.getElementById('tut-proceed-hint');
  if (btn)  btn.disabled = !allDone;
  if (hint) hint.style.display = allDone ? 'none' : 'inline';
}

// ── TOKENIZER ─────────────────────────────────────────────────────────────────
function tokenize(raw) {
  const tokens = [];
  let i = 0, idx = 0;
  const s = String(raw || '').replace(/_ *, *_/g, '_,_');

  function canStartSpan(pos) {
    if (pos === 0) return true;
    return !/\p{L}/u.test(s[pos - 1]);
  }

  while (i < s.length) {
    // Double-underscore span __token__
    if (s[i] === '_' && s[i+1] === '_' && canStartSpan(i)) {
      const end = s.indexOf('__', i + 2);
      if (end !== -1) {
        const content = s.slice(i+2, end);
        tokens.push({ text: content, isSpan: true, isDouble: true, index: idx++ });
        i = end + 2;
        continue;
      }
    }
    // Single-underscore span _token_
    if (s[i] === '_' && canStartSpan(i)) {
      const end = s.indexOf('_', i + 1);
      if (end !== -1) {
        const content = s.slice(i+1, end);
        if (content.trim().includes(' ')) {
          for (const part of content.split(/(\s+)/)) {
            if (part === '') continue;
            if (/^\s+$/.test(part)) tokens.push({ text: part, isSpan: false, isSpace: true });
            else tokens.push({ text: part, isSpan: true, index: idx++ });
          }
        } else {
          tokens.push({ text: content, isSpan: true, index: idx++ });
        }
        i = end + 1;
        continue;
      }
    }
    // Plain text
    let j = i + 1;
    while (j < s.length) {
      if (s[j] === '_' && canStartSpan(j)) break;
      j++;
    }
    const chunk = s.slice(i, j);
    for (const part of chunk.split(/(\s+)/)) {
      if (part === '') continue;
      if (/^\s+$/.test(part)) {
        tokens.push({ text: part, isSpan: false, isSpace: true });
      } else {
        // Split trailing/leading punctuation off words so e.g. "uh," → "uh" + ","
        for (const sub of part.split(/([,!?;:.]+)/)) {
          if (sub === '') continue;
          tokens.push({ text: sub, isSpan: false, isSpace: false, index: idx++ });
        }
      }
    }
    i = j;
  }

  // Post-pass: split CJK runs (Chinese / Japanese / CJK punctuation) into one
  // token per character so workers can highlight individual characters.
  // Without this, "_我觉得_" tokenizes to a single 3-char token — once you
  // unhighlight it, clicking only re-highlights the whole 3-char chunk.
  // Western tokens (Latin / Cyrillic / etc.) are left untouched.
  const CJK_RE = /[　-〿぀-ゟ゠-ヿ㐀-䶿一-鿿豈-﫿＀-￯]/;
  const CJK_SPLIT_RE = /[　-〿぀-ゟ゠-ヿ㐀-䶿一-鿿豈-﫿＀-￯]|[^　-〿぀-ゟ゠-ヿ㐀-䶿一-鿿豈-﫿＀-￯]+/g;
  const expanded = [];
  let nextIdx = 0;
  for (const tok of tokens) {
    if (tok.isSpace) {
      expanded.push(tok);
      continue;
    }
    if (!CJK_RE.test(tok.text)) {
      expanded.push({ ...tok, index: nextIdx++ });
      continue;
    }
    const parts = tok.text.match(CJK_SPLIT_RE) || [tok.text];
    for (const part of parts) {
      const sub = { text: part, isSpan: tok.isSpan, index: nextIdx++ };
      if (tok.isDouble) sub.isDouble = true;
      expanded.push(sub);
    }
  }
  return expanded;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Render tokens with interactive highlights for trans side,
// or read-only for en side. highlights = Set<number> | null (null = use isSpan default)
function renderTokens(tokens, uttId, slot, side, highlights) {
  return tokens.map(tok => {
    if (tok.isSpace) return escHtml(tok.text);
    const lit = highlights !== null ? highlights.has(tok.index) : tok.isSpan;
    if (lit) {
      if (side === 'trans') {
        return `<span class="hl" onclick="toggleHL('${uttId}','${slot}','${tok.index}')">${escHtml(tok.text)}</span>`;
      }
      return `<span class="hl">${escHtml(tok.text)}</span>`;
    } else {
      if (side === 'trans') {
        return `<span class="word" onclick="toggleHL('${uttId}','${slot}','${tok.index}')">${escHtml(tok.text)}</span>`;
      }
      return escHtml(tok.text);
    }
  }).join('');
}

// ── STATE ─────────────────────────────────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const LANG     = (params.get('lang') || '').toUpperCase();
const ITEMS    = INLINE_DATA[LANG] || [];
const PID_PREFILL = params.get('pid') || '';
// COMPLETION_CODE is parsed near the top of the script (see _CC_FROM_URL)
// because it's used by const expressions before the STATE section runs.

let annotatorInfo = null;   // { prolific_id, native_language, fluency, age_range }
let currentIdx    = 0;      // which item we're annotating
let edits         = {};     // { uttId: { slot: { highlights: Set, text? } } }
let noChangesFlags = {};    // { uttId: bool } — worker confirmed default highlights are correct
let saveStatus    = '';     // 'saving' | 'ok' | 'error' | ''

// Continuous-verification state. After every saveAndNext we record the
// (utt_id, slot) keys we tried to POST in localSubmittedKeys, then run a
// debounced background verify that fetches what the server actually has
// (serverSavedKeys) and re-posts anything still missing.
let localSubmittedKeys = new Set();   // keys the worker has submitted at least once
let serverSavedKeys    = new Set();   // keys confirmed present on server (via verify_saves)
let _verifyTimer       = null;        // debounce handle

function initEdits() {
  for (const item of ITEMS) {
    edits[item.utt_id] = {};
    for (const slot of SLOTS) {
      const raw = (item.translations || {})[slot];
      if (raw === undefined) continue;
      const toks = tokenize(raw);
      edits[item.utt_id][slot] = {
        highlights: new Set(toks.filter(t => t.isSpan).map(t => t.index))
      };
    }
  }
}

// ── LOCAL STORAGE ─────────────────────────────────────────────────────────────
function lsKey() {
  return `uh-mazing:${annotatorInfo?.prolific_id}:${LANG}`;
}
function saveToLocal() {
  const serialised = {};
  for (const [uttId, slots] of Object.entries(edits)) {
    serialised[uttId] = {};
    for (const [slot, e] of Object.entries(slots)) {
      serialised[uttId][slot] = {
        highlights: [...e.highlights],
        text: e.text
      };
    }
  }
  localStorage.setItem(lsKey(), JSON.stringify({
    currentIdx,
    annotatorInfo,
    edits: serialised,
    noChangesFlags,
    localSubmittedKeys: [...localSubmittedKeys],
    savedAt: Date.now()
  }));
}
function loadFromLocal() {
  const raw = localStorage.getItem(lsKey());
  if (!raw) return false;
  try {
    const saved = JSON.parse(raw);
    currentIdx    = saved.currentIdx || 0;
    annotatorInfo = saved.annotatorInfo || annotatorInfo;
    noChangesFlags = saved.noChangesFlags || {};
    localSubmittedKeys = new Set(saved.localSubmittedKeys || []);
    for (const [uttId, slots] of Object.entries(saved.edits || {})) {
      if (!edits[uttId]) continue;
      for (const [slot, e] of Object.entries(slots)) {
        if (!edits[uttId][slot]) continue;
        edits[uttId][slot] = {
          highlights: new Set(e.highlights || []),
          text: e.text
        };
      }
    }
    return true;
  } catch { return false; }
}

// ── COMPLETION TRACKING ───────────────────────────────────────────────────────
// An item counts as "completed" if the worker either marked "no changes"
// OR made any edit (highlight differs from default, or text was changed).
function _origSpansFor(item, slot) {
  const raw = (item.translations || {})[slot];
  if (raw === undefined) return null;
  const toks = tokenize(raw);
  return new Set(toks.filter(t => t.isSpan).map(t => t.index));
}
function hasEdits(uttId) {
  const item = ITEMS.find(i => i.utt_id === uttId);
  if (!item) return false;
  for (const slot of SLOTS) {
    const e = edits[uttId]?.[slot];
    if (!e) continue;
    if (e.text !== undefined) return true;
    const orig = _origSpansFor(item, slot);
    if (!orig) continue;
    if (e.highlights.size !== orig.size) return true;
    for (const i of e.highlights) if (!orig.has(i)) return true;
  }
  return false;
}
function isItemCompleted(uttId) {
  return noChangesFlags[uttId] === true || hasEdits(uttId);
}
function progressStats() {
  let completed = 0;
  for (const item of ITEMS) if (isItemCompleted(item.utt_id)) completed++;
  return { current: currentIdx, total: ITEMS.length, completed };
}

// Test-mode bypass: if the worker's Prolific ID contains "TEST" (case
// insensitive), skip the "all items completed" gate at Submit & Finish so
// QA testers can run through end-to-end without filling in 80 items.
function isTestMode() {
  return /TEST/i.test(annotatorInfo?.prolific_id || '');
}

function toggleHL(uttId, slot, idxArg) {
  const e   = edits[uttId]?.[slot];
  if (!e) return;
  const idx = Number(idxArg);
  if (e.highlights.has(idx)) e.highlights.delete(idx);
  else                        e.highlights.add(idx);

  const item = ITEMS.find(i => i.utt_id === uttId);
  if (!item) return;
  const raw     = e.text !== undefined ? e.text : (item.translations || {})[slot] || '';
  const toks    = tokenize(raw);
  const el      = document.getElementById(`trans-${uttId}-${slot}`);
  if (el) el.innerHTML = renderTokens(toks, uttId, slot, 'trans', e.highlights);
}

  document.getElementById(`edit-area-${uttId}-${slot}`).classList.add('open');

  document.getElementById(`edit-area-${uttId}-${slot}`).classList.remove('open');

function resetSlot(uttId, slot) {
  const item = ITEMS.find(i => i.utt_id === uttId);
  if (!item) return;
  const raw  = (item.translations || {})[slot] || '';
  const toks = tokenize(raw);

       </div>` : '';

  return `
  <div class="screen">
    ${testBanner}
    <div class="progress-wrap">
      <div class="progress-label">
        Item <strong>${currentIdx + 1}</strong> of ${ITEMS.length}
        · <strong>${stats.completed}</strong> completed (${pct}%)
        ${itemDone ? '<span style="color:#2e7d32;font-weight:600;margin-left:8px">✓ this item done</span>' : ''}
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:.88rem">
        <label for="jump-select" style="color:#666">Jump to:</label>
        <select id="jump-select" onchange="jumpToItem(this.value)" style="padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-size:.88rem">
          ${jumpOptions}
        </select>
      </div>
    </div>

    <div class="utt-card">
      <div class="utt-card-header">${escHtml(item.utt_id)}</div>
      <div class="utt-card-body">
        <div class="side-label">English (source)</div>
        <div class="en-text">${enHtml}</div>
        <div class="side-label">${LANG_NAMES[LANG] || LANG} translation${availSlots.length > 1 ? 's' : ''}</div>
        ${transRows}
      </div>
    </div>

    <div style="margin-top:14px;padding:10px 14px;background:#f9f8fb;border:1px solid #e0d9ec;border-radius:8px">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:.92rem">
        <input type="checkbox" ${noChg ? 'checked' : ''} onchange="toggleNoChanges('${item.utt_id}', this.checked)" style="width:16px;height:16px;accent-color:var(--accent)">
        <span>No changes needed for this translation — the default highlights are correct.</span>
      </label>
    </div>

    <div class="btn-row">
      ${currentIdx > 0 ? `<button class="btn btn-secondary" onclick="prevItem()">← Back</button>` : ''}
      <span class="save-status" id="save-status"></span>
      ${(() => {
        const isLast    = currentIdx + 1 >= ITEMS.length;
        const remaining = stats.total - stats.completed;
        if (isLast && remaining > 0 && !isTestMode()) {
          return `<button class="btn btn-primary" id="save-next-btn" disabled
                    title="Complete every item before submitting"
                    style="margin-left:auto;opacity:.5;cursor:not-allowed">
                    ${remaining} item${remaining === 1 ? '' : 's'} still need${remaining === 1 ? 's' : ''} to be done
                  </button>`;
        }
        return `<button class="btn btn-primary" id="save-next-btn" style="margin-left:auto" onclick="saveAndNext()">
                  ${isLast ? 'Submit &amp; Finish ✓' : 'Save &amp; Next →'}
                </button>`;
      })()}
    </div>
  </div>`;
}

function prevItem() {
  if (currentIdx > 0) { currentIdx--; render(); }
}

function jumpToItem(idxArg) {
  const idx = Number(idxArg);
  if (!Number.isInteger(idx) || idx < 0 || idx >= ITEMS.length) return;
  currentIdx = idx;
  saveToLocal();
  render();
}

function toggleNoChanges(uttId, checked) {
  noChangesFlags[uttId] = !!checked;
  saveToLocal();
  render();   // refresh progress bar / counts / dropdown ✓ markers
}


// ── SAVE & ADVANCE ────────────────────────────────────────────────────────────
// AI quality-check has been removed — workers now save and advance directly.

function buildPayloads(item) {
  const uttEdits = edits[item.utt_id] || {};
  const noChg    = noChangesFlags[item.utt_id] === true;
  const payloads = [];
  for (const slot of SLOTS) {
    const raw = (item.translations || {})[slot];
    if (raw === undefined) continue;
    const e = uttEdits[slot];
    if (!e) continue;
    const origToks  = tokenize(e.text !== undefined ? e.text : raw);
    const origSpans = new Set(origToks.filter(t => t.isSpan).map(t => t.index));
    // Rebuild the translation text with the worker's current highlight set
    // expressed as _word_ markup, so the sheet has the final annotated form.
    const text_annotated = origToks
      .filter(t => !t.isSpace)
      .map(t => e.highlights.has(t.index) ? `_${t.text}_` : t.text)
      .join(' ');
    payloads.push({
      type: 'annotation', lang: LANG, ...annotatorInfo,
      utt_id:    item.utt_id,
      slot,
      removed:   [...origSpans].filter(i => !e.highlights.has(i)),
      added:     [...e.highlights].filter(i => !origSpans.has(i)),
      text_edit:      e.text !== undefined ? e.text : '',
      text_annotated: text_annotated,
      no_changes:     noChg,
    });
  }
  return payloads;
}

async function saveAndNext() {
  const item     = ITEMS[currentIdx];
  const statusEl = document.getElementById('save-status');
  const saveBtn  = document.getElementById('save-next-btn');

  if (saveBtn)  saveBtn.disabled = true;
  if (statusEl) { statusEl.textContent = 'Saving…'; statusEl.className = 'save-status'; }

  const payloads = buildPayloads(item);
  try {
    await Promise.all(payloads.map(p => post(p)));
    if (statusEl) { statusEl.textContent = 'Saved ✓'; statusEl.className = 'save-status ok'; }
  } catch {
    if (statusEl) { statusEl.textContent = 'Save failed — continuing locally'; statusEl.className = 'save-status err'; }
  }

  // Track what we submitted and kick off a debounced background verify so
  // any silently-dropped no-cors POSTs get caught (and re-posted) within
  // the session, not only at the completion screen.
  for (const p of payloads) {
    localSubmittedKeys.add(`${p.utt_id}::${p.slot}`);
  }
  scheduleBackgroundVerify();

  saveToLocal();

  // If this would advance past the last item, only allow it when EVERY
  // item is completed (worker either marked "no changes" or made edits).
  // Otherwise jump to the first incomplete item instead. TEST-mode
  // Prolific IDs (containing "TEST") bypass this gate.
  if (currentIdx + 1 >= ITEMS.length) {
    const stats = progressStats();
    if (stats.completed < stats.total && !isTestMode()) {
      const firstIncomplete = ITEMS.findIndex(it => !isItemCompleted(it.utt_id));
      currentIdx = firstIncomplete >= 0 ? firstIncomplete : 0;
      saveToLocal();
      render();
      return;
    }
    currentIdx++;
    goTo('complete');
    return;
  }

  currentIdx++;
  render();
}

// ── BACKGROUND VERIFY ─────────────────────────────────────────────────────────
// Debounced verify-and-flush that runs DURING the session, not just at the
// end. After every saveAndNext we wait ~3s of idle, then ask the server
// what it actually has, and silently re-POST anything missing. Catches
// no-cors silent failures early so the completion screen verify is a
// no-op in the common case.
function scheduleBackgroundVerify(delayMs = 3000) {
  if (_verifyTimer) clearTimeout(_verifyTimer);
  _verifyTimer = setTimeout(() => {
    _verifyTimer = null;
    runBackgroundVerify();
  }, delayMs);
}

async function runBackgroundVerify() {
  if (!annotatorInfo?.prolific_id) return;
  let saved;
  try {
    saved = await fetchSavedRows();
  } catch (err) {
    // Silent failure — we'll try again after the next save.
    return;
  }
  serverSavedKeys = saved;
  // Anything submitted but not on the server gets a quiet re-POST.
  const missing = [...localSubmittedKeys].filter(k => !serverSavedKeys.has(k));
  if (missing.length === 0) return;
  for (const k of missing) {
    const [uttId, slot] = k.split('::');
    const payload = payloadForKey(uttId, slot);
    if (payload) post(payload);
  }
  // Re-check after Apps Script has had a moment to append.
  scheduleBackgroundVerify(2500);
}

// ── SCREEN: COMPLETE ──────────────────────────────────────────────────────────
// Renders a "Finalizing your submission…" placeholder, then runs an async
// verify-and-flush pass against the server. We only fire the "completed"
// intake event AND show the completion code once the server confirms every
// expected (utt_id, slot) row is present. This eliminates the "phantom
// completer" pattern (status=completed but Responses sheet short by 1–4
// rows) caused by Apps Script's appendRow being interrupted when the tab
// closes too quickly.
function screenComplete() {
  // Defer the actual verification until after this string is in the DOM.
  // Any verify failure is logged but the worker still sees the completion
  // code — their work is preserved either way.
  setTimeout(() => runFinalVerification().catch(err => {
    console.error('Final verification error:', err);
    showCompletionCode();
  }), 0);

  return `
  <div class="screen" style="text-align:center;padding:56px 48px" id="completeScreen">
    <div id="finalize-spinner" style="font-size:2.5rem;margin-bottom:16px">⏳</div>
    <h1 id="finalize-title">Finalizing your submission…</h1>
    <p id="finalize-status" style="margin-top:12px;color:#666">
      Verifying your annotations have been saved. Please don't close this tab.
    </p>
    <div id="finalize-progress" style="margin-top:18px;font-size:.9rem;color:#999;min-height:1.4em"></div>
    <div id="finalize-actions" style="margin-top:24px"></div>
  </div>`;
}

// ── FINAL VERIFICATION ─────────────────────────────────────────────────────────
// JSONP GET against Apps Script ?type=verify_saves — returns {saved: [{utt_id, slot}, ...]}
function fetchSavedRows() {
  return new Promise((resolve, reject) => {
    const cbName = '_verify_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    const script = document.createElement('script');
    const timer  = setTimeout(() => { cleanup(); reject(new Error('verify timeout')); }, 10000);
    function cleanup() { clearTimeout(timer); delete window[cbName]; script.remove(); }
    window[cbName] = (data) => {
      cleanup();
      if (data && data.status === 'ok') resolve(new Set((data.saved || []).map(r => `${r.utt_id}::${r.slot}`)));
      else reject(new Error(data?.message || 'verify error'));
    };
    script.onerror = () => { cleanup(); reject(new Error('verify network error')); };
    const params = new URLSearchParams({
      callback: cbName,
      type: 'verify_saves',
      prolific_id: annotatorInfo?.prolific_id || '',
      lang: LANG,
    });
    script.src = APPS_SCRIPT_URL + '?' + params.toString();
    document.head.appendChild(script);
  });
}

// Build the set of (utt_id, slot) keys that SHOULD exist on the server.
// One row is expected per (item, slot) the worker actually saw — i.e. every
// translation slot in ITEMS that has a non-null translation.
function expectedSaveKeys() {
  const keys = [];
  for (const item of ITEMS) {
    for (const slot of SLOTS) {
      const raw = (item.translations || {})[slot];
      if (raw === undefined) continue;
      keys.push(`${item.utt_id}::${slot}`);
    }
  }
  return keys;
}

// Reconstruct an annotation payload from current `edits` state, mirroring
// buildPayloads() but for a single (item, slot).
function payloadForKey(uttId, slot) {
  const item = ITEMS.find(i => i.utt_id === uttId);
  if (!item) return null;
  const e = edits[uttId]?.[slot];
  if (!e) return null;
  const raw       = (item.translations || {})[slot];
  if (raw === undefined) return null;
  const origToks  = tokenize(e.text !== undefined ? e.text : raw);
  const origSpans = new Set(origToks.filter(t => t.isSpan).map(t => t.index));
  const text_annotated = origToks
    .filter(t => !t.isSpace)
    .map(t => e.highlights.has(t.index) ? `_${t.text}_` : t.text)
    .join(' ');
  return {
    type: 'annotation',
    lang: LANG,
    ...annotatorInfo,
    utt_id:    uttId,
    slot,
    removed:   [...origSpans].filter(i => !e.highlights.has(i)),
    added:     [...e.highlights].filter(i => !origSpans.has(i)),
    text_edit:      e.text !== undefined ? e.text : '',
    text_annotated: text_annotated,
    no_changes:     noChangesFlags[uttId] === true,
  };
}

function setFinalStatus(text, sub) {
  const t = document.getElementById('finalize-status');
  const p = document.getElementById('finalize-progress');
  if (t && text !== undefined) t.textContent = text;
  if (p && sub  !== undefined) p.textContent = sub;
}

function showCompletionCode(extraNote) {
  const screen = document.getElementById('completeScreen');
  if (!screen) return;
  document.getElementById('finalize-spinner').textContent = '🎉';
  document.getElementById('finalize-title').textContent   = "You're done!";
  setFinalStatus(
    extraNote || 'Thank you for completing the annotation. Your responses have been recorded.',
    ''
  );
  const actions = document.getElementById('finalize-actions');
  if (actions) {
    actions.innerHTML = `
      <p style="margin:0 0 8px;color:#555">Please return to Prolific using your completion code:</p>
      <div class="completion-code">${COMPLETION_CODE}</div>
      <div style="margin-top:18px">
        <a href="${PROLIFIC_RETURN_URL}" class="btn btn-primary" style="text-decoration:none">
          Return to Prolific →
        </a>
      </div>`;
  }
}

// Main retry loop: verify, re-POST any missing rows, repeat until all
// expected keys are confirmed (or attempts exhausted). Then fire the
// completed-intake event and reveal the completion code.
async function runFinalVerification() {
  const expected = expectedSaveKeys();
  const total    = expected.length;
  if (total === 0) {
    showCompletionCode();
    post({ type: 'intake', lang: LANG, ...annotatorInfo, status: 'completed' });
    return;
  }

  // Fast path: if the in-session background verifies have already confirmed
  // every expected save, skip the full retry loop and go straight to the
  // completion code.
  const cachedMissing = expected.filter(k => !serverSavedKeys.has(k));
  if (cachedMissing.length === 0 && serverSavedKeys.size > 0) {
    setFinalStatus(undefined, `All ${total} saves confirmed.`);
    post({ type: 'intake', lang: LANG, ...annotatorInfo, status: 'completed' });
    showCompletionCode();
    return;
  }

  const MAX_ATTEMPTS = 3;
  for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
    setFinalStatus(undefined, `Checking server (attempt ${attempt}/${MAX_ATTEMPTS})…`);
    let saved;
    try {
      saved = await fetchSavedRows();
    } catch (err) {
      // verify call failed — short backoff and retry
      await new Promise(r => setTimeout(r, 600));
      continue;
    }

    const missing = expected.filter(k => !saved.has(k));
    setFinalStatus(undefined, `Saved ${total - missing.length}/${total} so far…`);

    if (missing.length === 0) {
      // Everything landed — fire completed intake and reveal the code now.
      post({ type: 'intake', lang: LANG, ...annotatorInfo, status: 'completed' });
      showCompletionCode();
      return;
    }

    // Re-POST the missing payloads from local state.
    setFinalStatus(undefined, `Re-saving ${missing.length} item${missing.length === 1 ? '' : 's'}…`);
    const reposts = missing.map(k => {
      const [uttId, slot] = k.split('::');
      const payload = payloadForKey(uttId, slot);
      return payload ? post(payload) : null;
    }).filter(Boolean);
    await Promise.all(reposts);

    // Brief wait for Apps Script appendRow to settle before re-verifying.
    await new Promise(r => setTimeout(r, 800));
  }

  // Out of attempts — still show the completion code. Verify failures are
  // logged to the console but the worker shouldn't be left hanging.
  showCompletionCode();
}

// ── SCREENS MAP ───────────────────────────────────────────────────────────────
const SCREENS = {
  consent:      screenConsent,
  intake:       screenIntake,
  instructions: screenInstructions,
  tutorial:     screenTutorial,
  annotate:     screenAnnotate,
  complete:     screenComplete,
};

// ── HTTP ──────────────────────────────────────────────────────────────────────
function post(data) {
  // Apps Script requires no-cors; we can't read response but data is written
  return fetch(APPS_SCRIPT_URL, {
    method:  'POST',
    headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
    body:    JSON.stringify(data),
    mode:    'no-cors',
  }).catch(() => {});  // silently fail — localStorage is the backup
}

// ── REPORT AN ISSUE ───────────────────────────────────────────────────────────
function openReportModal() {
  document.getElementById('report-msg').value = '';
  document.getElementById('report-status').textContent = '';
  document.getElementById('report-modal').classList.add('open');
  setTimeout(() => document.getElementById('report-msg').focus(), 50);
}
function closeReportModal(e) {
  // If called from overlay click, only close when clicking the backdrop itself
  if (e && e.target !== document.getElementById('report-modal')) return;
  document.getElementById('report-modal').classList.remove('open');
}
async function submitReport() {
  const msg = document.getElementById('report-msg').value.trim();
  const statusEl = document.getElementById('report-status');
  if (!msg) { statusEl.textContent = 'Please describe the issue first.'; return; }

  statusEl.textContent = 'Sending…';

  const info = annotatorInfo || {};
  await post({
    type:            'report',
    lang:            LANG,
    prolific_id:     info.prolific_id     || '',
    native_language: info.native_language || '',
    fluency:         info.fluency         || '',
    age_range:       info.age_range       || '',
    screen:          currentScreen,
    utt_id:          (currentScreen === 'annotate' && ITEMS[currentIdx]) ? ITEMS[currentIdx].utt_id : '',
    item_index:      currentScreen === 'annotate' ? String(currentIdx) : '',
    message:         msg,
  });

  statusEl.style.color = '#2e7d32';
  statusEl.textContent = 'Sent — thank you!';
  setTimeout(() => document.getElementById('report-modal').classList.remove('open'), 1600);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
if (!LANG || !INLINE_DATA[LANG]) {
  document.getElementById('app').innerHTML = `
    <div class="screen">
      <h1 style="color:#c00">Missing language parameter</h1>
      <p>This link is missing a <code>?lang=XX</code> parameter.
         Please use the link provided to you by the study.</p>
      <p>Valid languages: ${Object.keys(LANG_NAMES).join(', ')}</p>
    </div>`;
} else {
  render();
}
</script>
</body>
</html>
